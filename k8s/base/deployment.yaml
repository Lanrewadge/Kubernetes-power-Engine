apiVersion: apps/v1
kind: Deployment
metadata:
  name: power-engine
  namespace: power-engine
  labels:
    app: power-engine
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: power-engine
  template:
    metadata:
      labels:
        app: power-engine
    spec:
      serviceAccountName: power-engine-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: power-engine
          image: ghcr.io/lanrewadge/kubernetes-power-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: power-engine-config
            - secretRef:
                name: power-engine-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
