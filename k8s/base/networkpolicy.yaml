apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: power-engine
  namespace: power-engine
spec:
  podSelector:
    matchLabels:
      app: power-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
