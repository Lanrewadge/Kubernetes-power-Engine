apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-power-engine.fullname" . }}
  labels:
    app: {{ include "kubernetes-power-engine.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "kubernetes-power-engine.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "kubernetes-power-engine.name" . }}
    spec:
      containers:
        - name: {{ include "kubernetes-power-engine.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
