apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: power-engine-prod
  namespace: argocd
spec:
  project: power-engine
  source:
    repoURL: https://github.com/Lanrewadge/Kubernetes-power-Engine.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: power-engine
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
