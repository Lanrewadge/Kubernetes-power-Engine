name: CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Validate Kubernetes manifests
        uses: instrumenta/kubeval-action@master
        with:
          files: k8s/base

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy IaC/config scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Terrascan (Terraform)
        uses: tenable/terrascan-action@main
        with:
          iac_type: terraform
          iac_dir: terraform/aks
          policy_type: azure
          only_warn: false

      - name: Terrascan (Kubernetes manifests)
        uses: tenable/terrascan-action@main
        with:
          iac_type: k8s
          iac_dir: k8s/base
          policy_type: k8s
          only_warn: false

  docker-image:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/kubernetes-power-engine:${{ github.sha }} ./app

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/kubernetes-power-engine:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

  terraform-plan:
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: terraform/aks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=terraform.tfvars.example
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
